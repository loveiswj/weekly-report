<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>솔루션 교육팀 업무 관리 · 비아이매트릭스</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
:root{--navy:#1a1a2e;--blue:#5B8DEF;--green:#10B981;--amber:#F59E0B;--red:#EF4444;--purple:#8B5CF6;--bg:#f0f2f7;--border:#e0e3ec;--text:#222;--sub:#666;--hint:#aaa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--navy);color:#fff;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;}
.logo{font-size:.88rem;font-weight:700;}
.logo small{font-size:.7rem;opacity:.55;margin-left:6px;font-weight:400;}
.tab-nav{display:flex;gap:3px;}
.tab-btn{padding:5px 13px;border-radius:6px;border:1.5px solid transparent;background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;}
.tab-btn:hover{background:rgba(255,255,255,.22);color:#fff;}
.tab-btn.active{background:#fff;color:var(--navy);border-color:#CADCFC;}
.wrap{max-width:1100px;margin:0 auto;padding:1.2rem 1rem;}
.tab-page{display:none;}.tab-page.active{display:block;}
.card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:1.2rem;margin-bottom:1rem;}
.ct{font-size:.82rem;font-weight:700;color:#333;display:flex;align-items:center;gap:7px;margin-bottom:.9rem;}
.ct::before{content:'';width:3px;height:14px;background:var(--blue);border-radius:2px;flex-shrink:0;}
.mnav{display:flex;align-items:center;gap:8px;margin-bottom:1rem;}
.mnav-btn{padding:5px 12px;border:1px solid var(--border);border-radius:7px;background:#fff;cursor:pointer;font-size:.85rem;color:#444;}
.mnav-btn:hover{background:#f0f3ff;}
.mnav-lbl{font-size:1rem;font-weight:700;color:var(--navy);min-width:120px;text-align:center;}
.member-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:1rem;}
@media(max-width:600px){.member-grid{grid-template-columns:1fr;}}
.mc{background:#fff;border-radius:12px;border:1.5px solid var(--border);padding:1.1rem;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.mc:hover{border-color:var(--blue);box-shadow:0 2px 12px rgba(91,141,239,.12);}
.mc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mc-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;color:#fff;flex-shrink:0;}
.mc-name{font-size:.88rem;font-weight:700;color:var(--navy);}
.mc-role{font-size:.7rem;color:var(--sub);margin-top:1px;}
.mc-today{font-size:.76rem;color:var(--sub);}
.mc-today strong{color:var(--blue);font-weight:700;}
.mc-prog{margin-top:8px;}
.mc-bar{height:5px;background:#e8eaf0;border-radius:3px;overflow:hidden;margin-bottom:3px;}
.mc-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .3s;}
.mc-lbl{font-size:.7rem;color:var(--sub);display:flex;justify-content:space-between;}
.task-chips{margin-top:7px;display:flex;flex-direction:column;gap:3px;}
.chip{font-size:.73rem;padding:3px 7px;background:#f4f6fb;border-radius:4px;color:#444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chip.today{background:#EEF2FF;color:#3730A3;font-weight:600;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.kpi-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.9rem;}
.kpi-title{font-size:.72rem;color:var(--sub);margin-bottom:5px;}
.kpi-val{font-size:1.4rem;font-weight:800;color:var(--navy);}
.kpi-val span{font-size:.75rem;font-weight:400;color:var(--sub);}
.kpi-bar{height:4px;background:#e8eaf0;border-radius:2px;margin-top:7px;overflow:hidden;}
.kpi-fill{height:100%;border-radius:2px;background:var(--blue);}
.kpi-pct{font-size:.7rem;color:var(--blue);font-weight:600;margin-top:3px;}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.7rem;font-weight:700;white-space:nowrap;}
.b-done{background:#ECFDF5;color:#065F46;}
.b-doing{background:#FEF3C7;color:#D97706;}
.b-back{background:#F3F4F6;color:#6B7280;}
.t-table{width:100%;border-collapse:collapse;font-size:.8rem;}
.t-table th{font-size:.7rem;color:#aaa;font-weight:500;padding:5px 8px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
.t-table td{padding:6px 8px;border-bottom:1px solid #f0f2f7;vertical-align:middle;}
.t-table tr:hover td{background:#fafbff;}
.t-table .cat-row td{background:#f8f9ff;font-size:.75rem;font-weight:700;color:var(--navy);padding:4px 8px;}
.t-table .grp-row td{background:#fafafa;font-size:.72rem;font-weight:600;color:var(--sub);padding:3px 8px 3px 20px;}
.pbar{display:flex;align-items:center;gap:5px;}
.pbar-track{flex:1;height:5px;background:#e8eaf0;border-radius:3px;overflow:hidden;min-width:40px;}
.pbar-fill{height:100%;border-radius:3px;background:var(--blue);}
.pbar-num{font-size:.7rem;color:var(--blue);font-weight:600;min-width:26px;}
.atags{display:flex;flex-wrap:wrap;gap:3px;}
.atag{font-size:.68rem;font-weight:700;padding:2px 6px;border-radius:3px;color:#fff;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:all .15s;}
.btn-p{background:var(--navy);color:#fff;}.btn-p:hover{background:#2d2d5e;}
.btn-s{background:#fff;color:var(--navy);border:1.5px solid var(--border);}.btn-s:hover{background:var(--bg);}
.btn-d{background:#FEE2E2;color:#DC2626;}.btn-d:hover{background:#FECACA;}
.btn-sm{padding:4px 10px;font-size:.73rem;}
.f{display:flex;flex-direction:column;gap:3px;flex:1;min-width:90px;}
.f label{font-size:.7rem;color:#888;}
.f input,.f select,.f textarea{padding:7px 9px;border:1px solid var(--border);border-radius:7px;font-size:.82rem;color:var(--text);background:#fafbff;font-family:inherit;width:100%;}
.f textarea{resize:vertical;min-height:58px;line-height:1.5;}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:14px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.18);}
.modal-hd{padding:1.1rem 1.4rem .8rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;}
.modal-title{font-size:.95rem;font-weight:700;color:var(--navy);}
.modal-x{background:none;border:none;font-size:1.1rem;color:#aaa;cursor:pointer;padding:4px 8px;}
.modal-x:hover{color:#333;}
.modal-body{padding:1.1rem 1.4rem;}
.mt-item{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;border:1px solid var(--border);border-radius:8px;margin-bottom:7px;}
.mt-item.today-item{border-color:#A5B4FC;background:#EEF2FF;}
.mt-item.done-item{opacity:.5;background:#f9fafb;}
.mt-chk{width:17px;height:17px;accent-color:var(--blue);cursor:pointer;flex-shrink:0;margin-top:2px;}
.mt-info{flex:1;min-width:0;}
.mt-title{font-size:.83rem;font-weight:600;color:var(--navy);}
.mt-meta{font-size:.7rem;color:var(--sub);margin-top:2px;display:flex;gap:7px;flex-wrap:wrap;}
.today-tag{font-size:.65rem;font-weight:700;background:#4F46E5;color:#fff;padding:1px 5px;border-radius:3px;margin-left:3px;}
.ac-group{display:flex;gap:7px;flex-wrap:wrap;}
.ac-group label{display:flex;align-items:center;gap:4px;font-size:.8rem;cursor:pointer;padding:4px 9px;border:1px solid var(--border);border-radius:6px;user-select:none;}
.ac-group label:has(input:checked){border-color:var(--blue);background:#EEF2FF;color:#3730A3;font-weight:600;}
.gantt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.cal-cell{min-height:85px;border:1px solid var(--border);border-radius:6px;padding:4px;background:#fff;}
.cal-cell.today-cell{border-color:var(--blue);background:#EEF2FF;}
.cal-cell.empty-cell{background:#f8f9ff;border-color:#f0f2f7;}
.cal-date{font-size:.7rem;font-weight:700;color:var(--sub);margin-bottom:3px;}
.cal-cell.today-cell .cal-date{color:#3730A3;}
.cal-event{font-size:.63rem;padding:2px 4px;border-radius:3px;margin-bottom:2px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#fff;}
.wk-nav{display:flex;align-items:center;gap:6px;}
.wbtn{padding:5px 10px;border:1px solid var(--border);border-radius:7px;background:#fff;cursor:pointer;font-size:.83rem;color:#444;}
.wbtn:hover{background:#f0f3ff;}
.wlabel{font-size:.86rem;font-weight:600;color:var(--navy);min-width:155px;text-align:center;}
.sched-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:600px){.sched-grid{grid-template-columns:1fr;}}
.sbox{border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.sbox-hd{padding:7px 11px;font-size:.78rem;font-weight:700;}
.sbox-hd.this{background:#EEF2FF;color:#3730A3;}
.sbox-hd.next{background:#ECFDF5;color:#065F46;}
.sbox-body{padding:8px 11px;display:flex;flex-direction:column;gap:5px;min-height:60px;}
.irow{display:flex;gap:5px;align-items:center;}
.irow input{flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:.8rem;color:var(--text);background:#fafbff;font-family:inherit;}
.idel{background:none;border:none;color:#ccc;cursor:pointer;font-size:.85rem;padding:2px 4px;}
.idel:hover{color:#e44;}
.add-btn{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;border:1px dashed #c8d0e8;border-radius:6px;background:none;color:#888;cursor:pointer;font-size:.75rem;font-family:inherit;}
.add-btn:hover{background:#f0f3ff;color:#3730A3;}
.tr-row{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(0,3fr) 65px 72px 24px;gap:5px;margin-bottom:5px;align-items:center;}
.tr-row input,.tr-row select{padding:5px 7px;border:1px solid var(--border);border-radius:6px;font-size:.78rem;color:var(--text);background:#fafbff;width:100%;font-family:inherit;}
.tdel{background:none;border:none;color:#ccc;cursor:pointer;font-size:.82rem;padding:2px;}
.tdel:hover{color:#e44;}
.pct-mini{height:5px;border-radius:3px;background:#e8eaf0;margin-top:2px;overflow:hidden;}
.pct-fill2{height:100%;border-radius:3px;background:var(--blue);}
.tog-wrap{display:flex;align-items:center;gap:6px;font-size:.73rem;color:#888;}
.tog-inp{display:none;}
.tog-lbl{display:inline-block;width:34px;height:18px;background:#d1d5db;border-radius:9px;position:relative;cursor:pointer;transition:background .2s;}
.tog-lbl::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:2px;left:2px;transition:left .2s;}
.tog-inp:checked+.tog-lbl{background:var(--blue);}
.tog-inp:checked+.tog-lbl::after{left:18px;}
.sbar{padding:8px 12px;border-radius:7px;font-size:.78rem;margin-bottom:.8rem;display:none;}
.sbar.info{background:#eef2ff;color:#3730A3;border:1px solid #c7d2fe;display:block;}
.sbar.ok{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0;display:block;}
.sbar.err{background:#fff0f0;color:#c00;border:1px solid #fcc;display:block;}
.gen-btn{display:inline-flex;align-items:center;gap:7px;padding:.7rem 2.5rem;background:var(--navy);color:#fff;border:none;border-radius:9px;font-size:.92rem;font-weight:600;cursor:pointer;font-family:inherit;}
.gen-btn:hover{background:#2d2d5e;}
.gen-btn:disabled{background:#9aa3c2;cursor:not-allowed;}
.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:none;}
@keyframes sp{to{transform:rotate(360deg);}}
.sec-label{font-size:.7rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;margin:1rem 0 .4rem;}
.empty{text-align:center;padding:1.8rem;color:var(--hint);font-size:.82rem;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px;flex-shrink:0;}
.today-banner{background:#EEF2FF;border:1px solid #A5B4FC;border-radius:8px;padding:9px 14px;margin-bottom:1rem;font-size:.82rem;color:#3730A3;font-weight:600;}
.cat-badge{display:inline-block;font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:3px;margin-right:4px;}
</style>
</head>
<body>
<header>
  <div class="logo">솔루션 교육팀 업무 관리<small>비아이매트릭스</small></div>
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('home')" id="tab-home">🏠 홈</button>
    <button class="tab-btn" onclick="switchTab('tasks')" id="tab-tasks">📋 업무관리</button>
    <button class="tab-btn" onclick="switchTab('gantt')" id="tab-gantt">📊 간트</button>
    <button class="tab-btn" onclick="switchTab('cal')" id="tab-cal">📆 캘린더</button>
    <button class="tab-btn" onclick="switchTab('report')" id="tab-report">📝 주간보고</button>
  </div>
</header>

<!-- ══ 홈 ══ -->
<div id="page-home" class="tab-page active">
  <div class="wrap">
    <div id="todayBanner" class="today-banner"></div>
    <div class="card">
      <div class="ct">이번달 KPI</div>
      <div id="kpiGrid" class="kpi-grid"></div>
      <div id="kpiEmpty" class="empty" style="display:none;">업무관리 탭에서 KPI를 설정하세요</div>
    </div>
    <div style="font-size:.82rem;font-weight:700;color:#333;margin-bottom:10px;">팀원별 오늘 업무 &nbsp;<small style="font-size:.7rem;color:#aaa;font-weight:400;">카드 클릭 → 상세 할일 보기</small></div>
    <div class="member-grid" id="memberGrid"></div>
  </div>
</div>

<!-- ══ 업무관리 ══ -->
<div id="page-tasks" class="tab-page">
  <div class="wrap">
    <div class="mnav">
      <button class="mnav-btn" onclick="movePlanMonth(-1)">◀</button>
      <span class="mnav-lbl" id="planMonthLbl"></span>
      <button class="mnav-btn" onclick="movePlanMonth(1)">▶</button>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;">
        <div class="ct" style="margin-bottom:0;">월별 KPI</div>
        <button class="btn btn-s btn-sm" onclick="addKPI()">+ KPI 추가</button>
      </div>
      <div id="kpiList"></div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;">
        <div class="ct" style="margin-bottom:0;">업무 목록</div>
        <button class="btn btn-p btn-sm" onclick="openAddTask()">+ 업무 추가</button>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
        <select id="fAssignee" onchange="renderTaskTable()" style="padding:5px 8px;border:1px solid var(--border);border-radius:7px;font-size:.78rem;font-family:inherit;background:#fafbff;"><option value="">전체 담당자</option></select>
        <select id="fStatus" onchange="renderTaskTable()" style="padding:5px 8px;border:1px solid var(--border);border-radius:7px;font-size:.78rem;font-family:inherit;background:#fafbff;">
          <option value="">전체 상태</option><option>완료</option><option>진행중</option><option>백로그</option>
        </select>
        <select id="fCat" onchange="renderTaskTable()" style="padding:5px 8px;border:1px solid var(--border);border-radius:7px;font-size:.78rem;font-family:inherit;background:#fafbff;"><option value="">전체 카테고리</option></select>
      </div>
      <div style="overflow-x:auto;">
        <table class="t-table">
          <thead><tr><th>NO</th><th>카테고리</th><th>업무명</th><th>담당자</th><th>시작일</th><th>종료일</th><th>진척률</th><th>상태</th><th>비고</th><th></th></tr></thead>
          <tbody id="taskTbody"></tbody>
        </table>
      </div>
      <div id="taskEmpty" class="empty" style="display:none;">업무를 추가해주세요</div>
    </div>
  </div>
</div>

<!-- ══ 간트 ══ -->
<div id="page-gantt" class="tab-page">
  <div class="wrap">
    <div class="mnav">
      <button class="mnav-btn" onclick="moveGanttMonth(-1)">◀</button>
      <span class="mnav-lbl" id="ganttMonthLbl"></span>
      <button class="mnav-btn" onclick="moveGanttMonth(1)">▶</button>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;flex-wrap:wrap;gap:8px;">
        <div class="ct" style="margin-bottom:0;">주차별 간트차트</div>
        <div id="ganttLegend" style="display:flex;gap:10px;flex-wrap:wrap;"></div>
      </div>
      <div class="gantt-wrap" id="ganttWrap"></div>
    </div>
  </div>
</div>

<!-- ══ 캘린더 ══ -->
<div id="page-cal" class="tab-page">
  <div class="wrap">
    <div class="mnav">
      <button class="mnav-btn" onclick="moveCalMonth(-1)">◀</button>
      <span class="mnav-lbl" id="calMonthLbl"></span>
      <button class="mnav-btn" onclick="moveCalMonth(1)">▶</button>
    </div>
    <div class="card"><div id="calGrid"></div></div>
  </div>
</div>

<!-- ══ 주간보고 ══ -->
<div id="page-report" class="tab-page">
  <div class="wrap">
    <div id="rStatusBar" class="sbar"></div>
    <div class="card">
      <div class="ct">기본 정보</div>
      <div class="row">
        <div class="f" style="flex:2;min-width:180px;">
          <label>보고 주차</label>
          <div class="wk-nav"><button class="wbtn" onclick="moveWeek(-1)">◀</button><span class="wlabel" id="wlabel">–</span><button class="wbtn" onclick="moveWeek(1)">▶</button></div>
        </div>
        <div class="f"><label>보고일</label><input type="text" id="rdate"/></div>
        <div class="f"><label>작성자</label>
          <select id="author"><option>김원정 수석</option><option>장민지 선임</option><option>제현재 사원</option><option>허선희</option></select>
        </div>
        <div class="f"><label>팀명</label><input type="text" id="rteam" value="솔루션 교육팀"/></div>
      </div>
      <div style="margin-top:7px;"><button class="btn btn-s btn-sm" onclick="autoFill()">↻ 이번주 계획에서 자동 채우기</button></div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;">
        <div class="ct" style="margin-bottom:0;">주요 진행 업무</div>
        <div class="tog-wrap"><span id="lbl-task">포함</span><input type="checkbox" id="tog-task" class="tog-inp" checked onchange="togCard('task',this)"><label for="tog-task" class="tog-lbl"></label></div>
      </div>
      <div id="body-task">
        <div style="display:grid;grid-template-columns:minmax(0,1.5fr) minmax(0,3fr) 65px 72px 24px;gap:5px;margin-bottom:4px;padding:0 2px;">
          <span style="font-size:.68rem;color:#aaa;">구분</span><span style="font-size:.68rem;color:#aaa;">업무 내용</span><span style="font-size:.68rem;color:#aaa;">진척률</span><span style="font-size:.68rem;color:#aaa;">상태</span><span></span>
        </div>
        <div id="rTaskList"></div>
        <button class="add-btn" onclick="addRTask()">+ 업무 추가</button>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;">
        <div class="ct" style="margin-bottom:0;">주간 일정</div>

          <div class="f"><label>요청 / 지원 사항</label><textarea id="rRequests" placeholder="요청 내용"></textarea></div>

        </div>

      <div id="body-qa">

<!-- ══ 팀원 상세 모달 ══ -->

      </div>

<div class="modal-bg" id="taskModal" onclick="closeTaskModal(event)">

        <div class="f" style="flex:2;"><label>업무명 *</label><input type="text" id="tm-title" placeholder="업무 내용 입력"></div>
        <div class="f"><label>카테고리</label>
          <select id="tm-cat"><option>교육</option><option>그룹장님 지시업무</option><option>주요 업무</option><option>커뮤니티</option><option>기타</option></select>
        </div>
      </div>
      <div class="row" style="margin-bottom:9px;">
        <div class="f"><label>그룹 (선택)</label><input type="text" id="tm-group" placeholder="예: 정기교육, AI활용 기획안"></div>
      </div>
      <div style="margin-bottom:9px;">
        <label style="font-size:.7rem;color:#888;display:block;margin-bottom:5px;">담당자 * (복수 선택 가능)</label>
        <div class="ac-group" id="tmAssigneeChecks"></div>
      </div>

        <div class="f"><label>시작일</label><input type="date" id="tm-start"></div>
        <div class="f"><label>종료일</label><input type="date" id="tm-end"></div>
        <div class="f"><label>진척률 (%)</label><input type="number" id="tm-pct" min="0" max="100" value="0"></div>
      </div>

        <div class="f"><label>상태</label>
          <select id="tm-status"><option value="백로그">백로그</option><option value="진행중">진행중</option><option value="완료">완료</option></select>
        </div>
        <div class="f" style="flex:2;"><label>비고</label><input type="text" id="tm-note" placeholder="메모 (선택)"></div>
      </div>

        <button class="btn btn-s" onclick="closeTaskModalBtn()">취소</button>
        <button class="btn btn-p" onclick="saveTask()">저장</button>

<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script>
const MEMBERS=['김원정 수석','장민지 선임','제현재 사원','허선희'];
const MANAGER='김원정 수석';
const M_COLORS=['#1a1a2e','#5B8DEF','#10B981','#F59E0B'];
const CATS=['교육','그룹장님 지시업무','주요 업무','커뮤니티','기타'];
const CAT_COLORS={교육:'#5B8DEF','그룹장님 지시업무':'#8B5CF6','주요 업무':'#10B981',커뮤니티:'#F59E0B',기타:'#6B7280'};
const PLAN_KEY='bm_plan_v3';

function loadData(){try{return JSON.parse(localStorage.getItem(PLAN_KEY))||{plans:{}};}catch{return{plans:{}};}}
function saveData(d){localStorage.setItem(PLAN_KEY,JSON.stringify(d));}
function mkKey(y,m){return y+'-'+String(m+1).padStart(2,'0');}
function getPlan(key){const d=loadData();if(!d.plans[key])d.plans[key]={kpis:[],tasks:[]};return d.plans[key];}
function savePlan(key,plan){const d=loadData();d.plans[key]=plan;saveData(d);}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}

function switchTab(t){
  ['home','tasks','gantt','cal','report'].forEach(x=>{
    document.getElementById('page-'+x).classList.toggle('active',x===t);
    document.getElementById('tab-'+x).classList.toggle('active',x===t);
  });
  if(t==='home')renderHome();
  if(t==='tasks')renderPlan();
  if(t==='gantt')renderGantt();
  if(t==='cal')renderCal();
}

let planY=new Date().getFullYear(),planM=new Date().getMonth();
let ganttY=new Date().getFullYear(),ganttM=new Date().getMonth();
let calY=new Date().getFullYear(),calM=new Date().getMonth();

function movePlanMonth(d){planM+=d;if(planM<0){planM=11;planY--;}if(planM>11){planM=0;planY++;}renderPlan();}
function moveGanttMonth(d){ganttM+=d;if(ganttM<0){ganttM=11;ganttY--;}if(ganttM>11){ganttM=0;ganttY++;}renderGantt();}
function moveCalMonth(d){calM+=d;if(calM<0){calM=11;calY--;}if(calM>11){calM=0;calY++;}renderCal();}
function mlbl(y,m){return y+'년 '+(m+1)+'월';}

/* ── 홈 ── */
function renderHome(){
  const today=new Date(),ts=toISO(today);
  const key=mkKey(today.getFullYear(),today.getMonth());
  const plan=getPlan(key);
  const days=['일','월','화','수','목','금','토'];
  document.getElementById('todayBanner').innerHTML='📅 오늘 <strong>'+today.getFullYear()+'년 '+(today.getMonth()+1)+'월 '+today.getDate()+'일 ('+days[today.getDay()]+')</strong>'+(today.getDay()===4?' &nbsp;🔔 <strong>목요일</strong> — 주간보고 작성일!':'');
  const kg=document.getElementById('kpiGrid'),ke=document.getElementById('kpiEmpty');
  if(!plan.kpis||!plan.kpis.length){kg.innerHTML='';ke.style.display='block';}
  else{ke.style.display='none';kg.innerHTML=plan.kpis.map(k=>{const pct=k.target?Math.min(100,Math.round((k.current||0)/k.target*100)):0;return'<div class="kpi-card"><div class="kpi-title">'+k.title+'</div><div class="kpi-val">'+(k.current||0)+'<span> / '+k.target+(k.unit||'')+'</span></div><div class="kpi-bar"><div class="kpi-fill" style="width:'+pct+'%"></div></div><div class="kpi-pct">'+pct+'% 달성</div></div>';}).join('');}
  const grid=document.getElementById('memberGrid');grid.innerHTML='';
  MEMBERS.forEach((name,i)=>{
    const color=M_COLORS[i];
    const tasks=(plan.tasks||[]).filter(t=>t.assignees&&t.assignees.includes(name));
    const todayT=tasks.filter(t=>isToday(t,ts));
    const doneT=tasks.filter(t=>t.status==='완료');
    const pct=tasks.length?Math.round(doneT.length/tasks.length*100):0;
    const div=document.createElement('div');div.className='mc';
    div.innerHTML='<div class="mc-head"><div style="display:flex;align-items:center;gap:9px;"><div class="mc-av" style="background:'+color+'">'+name.slice(0,1)+'</div><div><div class="mc-name">'+name+'</div><div class="mc-role">'+(name===MANAGER?'팀장':'팀원')+'</div></div></div><div class="mc-today">오늘 <strong>'+todayT.length+'</strong>건</div></div><div class="mc-prog"><div class="mc-bar"><div class="mc-fill" style="width:'+pct+'%"></div></div><div class="mc-lbl"><span>이번달 완료율</span><span>'+doneT.length+'/'+tasks.length+'건 ('+pct+'%)</span></div></div>'+(todayT.length?'<div class="task-chips">'+todayT.slice(0,3).map(t=>'<div class="chip today">● '+t.title+'</div>').join('')+'</div>':'');
    div.onclick=()=>openMemberModal(name,ts,plan);
    grid.appendChild(div);
  });
}

function isToday(task,ts){
  if(!task.startDate&&!task.endDate)return false;
  const s=task.startDate||ts,e=task.endDate||ts;
  return s<=ts&&ts<=e&&task.status!=='완료';
}

/* ── 팀원 모달 ── */
function openMemberModal(name,ts,plan){
  const i=MEMBERS.indexOf(name);
  document.getElementById('mModalAv').textContent=name.slice(0,1);
  document.getElementById('mModalAv').style.background=M_COLORS[i]||'#1a1a2e';
  document.getElementById('mModalName').textContent=name;
  document.getElementById('mModalDate').textContent=ts+' 기준';
  const key=mkKey(new Date().getFullYear(),new Date().getMonth());
  const tasks=(plan.tasks||[]).filter(t=>t.assignees&&t.assignees.includes(name));
  const body=document.getElementById('mModalBody');
  if(!tasks.length){body.innerHTML='<div class="empty">이번달 배정된 업무가 없습니다.</div>';document.getElementById('memberModal').classList.add('open');return;}
  const todayT=tasks.filter(t=>isToday(t,ts));
  const activeT=tasks.filter(t=>!isToday(t,ts)&&t.status!=='완료');
  const doneT=tasks.filter(t=>t.status==='완료');
  let html='';
  if(todayT.length){html+='<div class="sec-label">🔴 오늘 할 일 ('+todayT.length+'건)</div>';html+=todayT.map(t=>mtItem(t,true,false,key)).join('');}
  if(activeT.length){html+='<div class="sec-label" style="margin-top:'+(todayT.length?'1rem':'0')+';">📋 진행중 업무</div>';html+=activeT.map(t=>mtItem(t,false,false,key)).join('');}
  if(doneT.length){html+='<div class="sec-label" style="margin-top:1rem;">✅ 완료 ('+doneT.length+'건)</div>';html+=doneT.map(t=>mtItem(t,false,true,key)).join('');}
  body.innerHTML=html;
  document.getElementById('memberModal').classList.add('open');
}

function mtItem(t,isT,isDone,key){
  return'<div class="mt-item '+(isT?'today-item':'')+(isDone?' done-item':'')+'" id="mti-'+t.id+'">'+
    '<input type="checkbox" class="mt-chk" '+(isDone?'checked':'')+' onchange="toggleDone(\''+t.id+'\',\''+key+'\',this)">'+
    '<div class="mt-info"><div class="mt-title">'+esc(t.title)+(isT?'<span class="today-tag">TODAY</span>':'')+'</div>'+
    '<div class="mt-meta"><span>'+t.category+'</span>'+(t.startDate||t.endDate?'<span>'+fmtRange(t.startDate,t.endDate)+'</span>':'')+
    '<span class="badge '+(t.status==='완료'?'b-done':t.status==='진행중'?'b-doing':'b-back')+'">'+t.status+'</span>'+(t.pct?'<span>'+t.pct+'%</span>':'')+
    '</div>'+(t.note?'<div style="font-size:.7rem;color:var(--sub);margin-top:3px;">'+esc(t.note)+'</div>':'')+
    '</div></div>';
}

function toggleDone(id,key,cb){
  const plan=getPlan(key);const t=plan.tasks.find(x=>x.id===id);if(!t)return;
  t.status=cb.checked?'완료':'진행중';t.pct=cb.checked?100:t.pct;t.completedAt=cb.checked?new Date().toISOString():null;
  savePlan(key,plan);
  const el=document.getElementById('mti-'+id);
  if(el){el.classList.toggle('done-item',cb.checked);el.classList.toggle('today-item',!cb.checked);}
}

function closeMemberModal(e){if(e.target===document.getElementById('memberModal'))closeMemberModalBtn();}
function closeMemberModalBtn(){document.getElementById('memberModal').classList.remove('open');}

/* ── 업무관리 ── */
function renderPlan(){
  const key=mkKey(planY,planM);const plan=getPlan(key);
  document.getElementById('planMonthLbl').textContent=mlbl(planY,planM);
  renderKPIList(plan,key);renderTaskTable();
  const fa=document.getElementById('fAssignee');
  fa.innerHTML='<option value="">전체 담당자</option>'+MEMBERS.map(m=>'<option>'+m+'</option>').join('');
  const fc=document.getElementById('fCat');
  fc.innerHTML='<option value="">전체 카테고리</option>'+CATS.map(c=>'<option>'+c+'</option>').join('');
}

function renderKPIList(plan,key){
  const el=document.getElementById('kpiList');
  if(!plan.kpis||!plan.kpis.length){el.innerHTML='<div class="empty" style="padding:.8rem;">KPI를 추가하세요</div>';return;}
  el.innerHTML=plan.kpis.map(k=>'<div style="display:flex;gap:7px;align-items:center;margin-bottom:7px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;background:#fafbff;">'+
    '<input type="text" value="'+esc(k.title)+'" onchange="updKPI(\''+key+'\',\''+k.id+'\',\'title\',this.value)" style="flex:2;min-width:0;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:.8rem;font-family:inherit;" placeholder="KPI명">'+
    '<input type="number" value="'+(k.current||0)+'" onchange="updKPI(\''+key+'\',\''+k.id+'\',\'current\',+this.value)" style="width:65px;padding:5px 7px;border:1px solid var(--border);border-radius:6px;font-size:.8rem;font-family:inherit;" placeholder="현재">'+
    '<span style="font-size:.73rem;color:#aaa;">/ 목표</span>'+
    '<input type="number" value="'+k.target+'" onchange="updKPI(\''+key+'\',\''+k.id+'\',\'target\',+this.value)" style="width:65px;padding:5px 7px;border:1px solid var(--border);border-radius:6px;font-size:.8rem;font-family:inherit;" placeholder="목표">'+
    '<input type="text" value="'+(k.unit||'')+'" onchange="updKPI(\''+key+'\',\''+k.id+'\',\'unit\',this.value)" style="width:45px;padding:5px 7px;border:1px solid var(--border);border-radius:6px;font-size:.8rem;font-family:inherit;" placeholder="단위">'+
    '<button onclick="delKPI(\''+key+'\',\''+k.id+'\')" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:.85rem;padding:2px;">✕</button></div>'
  ).join('');
}

function addKPI(){const key=mkKey(planY,planM);const plan=getPlan(key);plan.kpis.push({id:genId(),title:'',target:10,unit:'건',current:0});savePlan(key,plan);renderPlan();setTimeout(()=>{const inp=document.querySelectorAll('#kpiList input[type=text]');if(inp.length)inp[inp.length-1].focus();},50);}
function updKPI(key,id,f,v){const p=getPlan(key);const k=p.kpis.find(x=>x.id===id);if(k){k[f]=v;savePlan(key,p);}}
function delKPI(key,id){const p=getPlan(key);p.kpis=p.kpis.filter(x=>x.id!==id);savePlan(key,p);renderPlan();}

function renderTaskTable(){
  const key=mkKey(planY,planM);const plan=getPlan(key);
  const tbody=document.getElementById('taskTbody'),empty=document.getElementById('taskEmpty');
  const fa=document.getElementById('fAssignee')?.value||'';
  const fs=document.getElementById('fStatus')?.value||'';
  const fc=document.getElementById('fCat')?.value||'';
  let tasks=plan.tasks||[];
  if(fa)tasks=tasks.filter(t=>t.assignees&&t.assignees.includes(fa));
  if(fs)tasks=tasks.filter(t=>t.status===fs);
  if(fc)tasks=tasks.filter(t=>t.category===fc);
  if(!tasks.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  let rows='',no=1;
  CATS.forEach(cat=>{
    const ct=tasks.filter(t=>t.category===cat);if(!ct.length)return;
    const cc=CAT_COLORS[cat]||'#aaa';
    rows+='<tr class="cat-row"><td colspan="10" style="border-left:3px solid '+cc+';background:'+cc+'18;color:'+cc+';">'+cat+'</td></tr>';
    const groups={};ct.forEach(t=>{const g=t.group||'';if(!groups[g])groups[g]=[];groups[g].push(t);});
    Object.entries(groups).forEach(([grp,gt])=>{
      if(grp)rows+='<tr class="grp-row"><td colspan="10">📁 '+esc(grp)+'</td></tr>';
      gt.forEach(t=>{
        rows+='<tr style="'+(t.status==='완료'?'opacity:.6;':'')+'">'+
          '<td style="color:#aaa;font-size:.7rem;">'+no+'</td>'+
          '<td><span class="cat-badge" style="background:'+cc+'22;color:'+cc+';">'+cat+'</span></td>'+
          '<td>'+esc(t.title)+(t.group?'<div style="font-size:.65rem;color:#aaa;">'+esc(t.group)+'</div>':'')+'</td>'+
          '<td><div class="atags">'+(t.assignees||[]).map(a=>{const ci=MEMBERS.indexOf(a);return'<span class="atag" style="background:'+M_COLORS[ci]+';">'+a.split(' ')[0]+'</span>';}).join('')+'</div></td>'+
          '<td style="font-size:.73rem;color:var(--sub);">'+(t.startDate||'-')+'</td>'+
          '<td style="font-size:.73rem;color:var(--sub);">'+(t.endDate||'-')+'</td>'+

function getMonthWeeks(y,m){
  const weeks=[],first=new Date(y,m,1),last=new Date(y,m+1,0);
  let cur=new Date(first);
  const dow=cur.getDay();
  if(dow===0)cur.setDate(cur.getDate()-6);
  else if(dow>1)cur.setDate(cur.getDate()-(dow-1));
  let wn=1;
  while(cur<=last){
    const ws=new Date(cur),we=new Date(cur);we.setDate(we.getDate()+4);
    if(ws.getMonth()===m||we.getMonth()===m)
      weeks.push({start:toISO(ws),end:toISO(we),label:(m+1)+'월 '+wn+'주'});
    cur.setDate(cur.getDate()+7);wn++;
  }
  return weeks;
}

let weekOff=0;
function getWeekInfo(off){
  const today=new Date(),dow=today.getDay();
  const thu=new Date(today);thu.setDate(today.getDate()+(4-dow+off*7));
  const mon=new Date(thu);mon.setDate(thu.getDate()-3);
  const fri=new Date(thu);fri.setDate(thu.getDate()+1);
  const fmt=d=>d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0');
  const fiso=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  const sy=new Date(thu.getFullYear(),0,1);
  const wn=Math.ceil(((thu-sy)/86400000+sy.getDay()+1)/7);
  return{title:thu.getFullYear()+'년 '+wn+'주차 ('+fmt(mon)+' ~ '+fmt(fri)+')',date:fmt(thu)+' (목)',start:fiso(mon),end:fiso(fri)};
}

function toISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtRange(s,e){if(!s&&!e)return'';if(s&&e&&s!==e)return s.slice(5)+' ~ '+e.slice(5);return(s||e).slice(5);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
